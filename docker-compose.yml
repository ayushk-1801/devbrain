services:

  # -----------------------------------------------------------------------
  # Redis — job queue broker (shared by API and worker)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------------------
  # Backend — FastAPI REST API + webhook receiver
  # Enqueues jobs to Redis; never runs ingestion inline.
  # -----------------------------------------------------------------------
  devbrain-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      COGNEE_DATA_DIR: /data/cognee
      COGNEE_SYSTEM_DIR: /data/cognee-system
      REGISTRY_PATH: /data/devbrain/repos.json
      REDIS_URL: redis://redis:6379
    volumes:
      - cognee-data:/data/cognee
      - cognee-system:/data/cognee-system
      - devbrain-registry:/data/devbrain
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------------------
  # ARQ worker — runs ingestion tasks off the API process
  # Scale horizontally: docker compose up --scale devbrain-worker=3
  # -----------------------------------------------------------------------
  devbrain-worker:
    build: .
    command: ["python", "-m", "arq", "backend.worker.WorkerSettings"]
    env_file: .env
    environment:
      COGNEE_DATA_DIR: /data/cognee
      COGNEE_SYSTEM_DIR: /data/cognee-system
      REGISTRY_PATH: /data/devbrain/repos.json
      REDIS_URL: redis://redis:6379
    volumes:
      - cognee-data:/data/cognee
      - cognee-system:/data/cognee-system
      - devbrain-registry:/data/devbrain
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # MCP server — thin httpx client for AI agents (Claude Code, OpenCode)
  # Users run this locally; included here for testing only.
  # -----------------------------------------------------------------------
  devbrain-mcp:
    build: .
    command: ["python", "-m", "backend.mcp_server"]
    environment:
      DEVBRAIN_API_URL: http://devbrain-api:8000
    depends_on:
      devbrain-api:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - mcp

  # -----------------------------------------------------------------------
  # Platform service — GitHub OAuth login + per-user instance provisioner
  # Runs on port 9000; provisions tenant containers via Docker socket.
  # -----------------------------------------------------------------------
  devbrain-platform:
    build: .
    command: ["uvicorn", "backend.platform.app:platform_app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      PLATFORM_DB_PATH: /data/platform/platform.db
      PLATFORM_DATA_DIR: /data/platform
      DEVBRAIN_IMAGE: devbrain-devbrain-api
      REDIS_URL: redis://redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker control
      - platform-db:/data/platform
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  redis-data:
  cognee-data:
  cognee-system:
  devbrain-registry:
  platform-db:

networks:
  default:
    name: devbrain-platform
